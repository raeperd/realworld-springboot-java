version: 2
updates:
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    open-pull-requests-limit: 5
    groups:
      spring:
        patterns:
          - "org.springframework.boot*"
          - "io.spring.dependency-management"
      gradle-plugins:
        patterns:
          - "org.ec4j.editorconfig"
          - "com.google.cloud.tools.jib"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - "*"
